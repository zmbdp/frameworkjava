# XXL-Job 执行器配置
xxl:
  job:
    admin:
      # 调度中心地址（多个地址用逗号分隔）
      # 如果业务服务也跑在同一个 Docker Compose 网络里，用 http://xxl-job-admin:8080/xxl-job-admin
      # 如果业务服务跑在宿主机或其他网络，就填内网 IP + 8081
      addresses: http://xxl-job-admin:8080/xxl-job-admin
    executor:
      # 执行器 AppName（需与调度中心配置一致）
      appname: ${spring.application.name}-executor
      # 执行器注册地址（为空则自动获取 IP）
      address:
      # 执行器 IP（为空则自动获取）
      ip:
      # 执行器端口（-1 则自动获取可用端口）
      port: -1
      # 访问令牌（需与调度中心配置一致）
      accessToken: frameworkjava_dev
      # 执行器日志路径
      logpath: /data/applogs/xxl-job/executor
      # 执行器日志保留天数（-1 永不清理）
      logretentiondays: 30

# 布隆过滤器 XXL-Job 降级配置
# 正常情况由 XXL-Job 调度中心接管，以下为降级兜底开关
bloom:
  filter:
    fallback:
      # 是否启用 Spring Scheduled 降级（默认 false，由 XXL-Job 接管）
      enabled: false
      # 降级 CRON 表达式（仅 enabled=true 时生效）
      cron: 0 0 4 * * ?
